<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .outbox{
            border: solid 2px;
            height: 600px;
            width: 600px;
            margin: auto;
            display: grid;
            grid-template-columns: repeat(3,200px);
            grid-template-columns: repeat(3,200px);
        }
        .inbox{
            height: 200px;
            width: 200px;
            border: solid 1px;
            text-align: center;
            font-size: 150px;
        }
        .dark{
            background-color: black;
            color: antiquewhite;
        }
    </style>
</head>
<body>
    <h1 class="heading">TIC-TAC-TOE GAME <button class="btn"><i class="fa-solid fa-sun"></i></button></h1>
    <div class="outbox">
        <div class="inbox" id="0"></div>
        <div class="inbox" id="1"></div>
        <div class="inbox" id="2"></div>
        <div class="inbox" id="3"></div>
        <div class="inbox" id="4"></div>
        <div class="inbox" id="5"></div>
        <div class="inbox" id="6"></div>
        <div class="inbox" id="7"></div>
        <div class="inbox" id="8"></div>
    </div>


    <script src="https://kit.fontawesome.com/607182b0b6.js" crossorigin="anonymous"></script>
    <script src="self.js"></script>
</body>
</html>
