<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="spotify.css">
    <style>
       body{
        background-color: rgb(20, 21, 20);
        color: aliceblue;
       }
       #box{
        margin-top: 900px;
         height: 400px;
         width: 500px;
         border: 1px solid rgb(14, 14, 14);
       }
       .logo{
        background-image: url('kartik4.jpg');
        border-radius: 50%;
        height: 70px;
        width: 70px;
       }
       .navbar{
        display: flex;
        flex-direction: row;
        position: relative; 
        background: linear-gradient(45deg, rgb(17, 103, 17),black);
       }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="log" style="display: flex;flex-direction: row;">
            <div class="logo"></div>
            <span style=" font-family:Gill Sans Extrabold;font-size: 40px;-webkit-text-fill-color: rgb(225, 228, 237);padding-top: 15px;";><b>Miraify</b></span>
        </div>
        <div class="supp" style="display: flex;flex-direction: row; margin-left: 500px;padding-top: 25px;"><span><b>Support</b></span><span style="margin-left: 100px;"><b>Download</b></span><span style="margin-left: 40px;">|</span><span style="margin-left: 60px;"><b>Sign up</b></span><span style="margin-left: 60px;"><b><a href="#box">Log in</a></b></span></div>
        <div class="down"></div>
    </div>
    <div id="box">
     <form action="/login" method="post">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required>
        <br>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
        <br>
        <label for="email">Email:</label>
        <input type="mail" id="mail" name="mail" required>
        <br><br>
        <button type="submit">Sign up</button>
    </div>
        <script src="script.js"></script>
</body>
</html>
