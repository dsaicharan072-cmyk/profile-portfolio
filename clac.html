<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .cal{
            height: 700px;
            width: 400px;
            border: 5px solid black;
            display: flex;
            flex-direction: column;
        }
        .dis{
            height: 300px;
            width: 380px;
            border: 2px solid black;
            margin-left: 10px;
            font-size: 100px;
        }
        .keys{
            height: 390px;
            width: 380px;
            border: 2px solid black;
            margin-left: 10px;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
        }
        .no{
            border-radius: 50%;
            height: 90px;
            width: 90px;
            border: 1px solid black;
            text-align: center;
            font-size: 60px;
        }
    </style>
</head>
<body>
    <div class="cal">
        <div class="dis"></div>
        <div class="keys">
            <div class="no">1</div>
            <div class="no">2</div>
            <div class="no">3</div>
            <div class="no">4</div>
            <div class="no">5</div>
            <div class="no">6</div>
            <div class="no">7</div>
            <div class="no">8</div>
            <div class="no">9</div>
            <div class="no">0</div>
            <div class="no">+</div>
            <div class="no">-</div>
            <div class="no">/</div>
            <div class="no">*</div>
            <div class="no">AC</div>
            <div class="no">=</div>
        </div>
    </div>
    <script src="calc.js"></script>
</body>
</html>
