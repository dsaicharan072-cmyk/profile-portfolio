<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #canvas{
            border: 2px solid black;
            box-shadow: inset 0 0 10px rgb(84, 80, 80);
        }
        .colors{
            display: flex;
            flex-direction: row;
            gap: 8px;
        }
        .color{
            height: 30px;
            width: 30px;
        }
        .btn{
            display: flex;
            flex-direction: row;
            gap: 10px;
        }
    </style>
</head>
<body>
    <h1>Drawing</h1>
    <canvas id="canvas"></canvas>
    <div class="btn" >
        <button id="clear">Clear</button>
        <button id="undo">Undo</button>
        <button id="redo">Redo</button>
        <input id="thick" type="range" >
        <div class="colors">
            <div id="red" class="color" style="background-color: red;"></div>
            <div id="blue "class="color" style="background-color: blue;"></div>
            <div id="green" class="color" style="background-color: green;"></div>
            <input  class="color"  type="color" id="color-pick">
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
